<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Ficha - Portal do Cliente</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0F1115] text-white p-4 font-sans">

    <div id="app" class="max-w-xl mx-auto">
        <div class="text-center py-10">
            <h1 class="text-xl font-black">Carregando portal exclusivo...</h1>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAMYE7ZLM4jtoVnshqowLSaSL-mYCW1lhI",
            authDomain: "sistemas-inteligentes-38cdc.firebaseapp.com",
            projectId: "sistemas-inteligentes-38cdc",
            storageBucket: "sistemas-inteligentes-38cdc.firebasestorage.app",
            messagingSenderId: "632476998816",
            appId: "1:632476998816:web:3cb6936a5e3517b09dbdc5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function carregarVisualizacao() {
            const params = new URLSearchParams(window.location.search);
            const cid = params.get('cid');
            const aid = params.get('aid');

            if (!cid || !aid) {
                document.getElementById('app').innerHTML = "Link inválido.";
                return;
            }

            try {
                const [clienteSnap, alunoSnap] = await Promise.all([
                    getDoc(doc(db, "clients", cid)),
                    getDoc(doc(db, "clients", cid, "dados", aid))
                ]);

                if (!clienteSnap.exists() || !alunoSnap.exists()) {
                    document.getElementById('app').innerHTML = "Dados não encontrados.";
                    return;
                }

                const config = clienteSnap.data().configuracaoPersonalizada;
                const dados = alunoSnap.data();

                // ESTRUTURA PREMIUM ORGANIZADA
                document.getElementById('app').innerHTML = `
                    <div class="space-y-10">
                        <div class="text-center space-y-2">
                            <div class="relative w-24 h-24 mx-auto group">
                                <div class="w-24 h-24 bg-gray-800 rounded-full overflow-hidden border-2 border-blue-500 mb-4">
                                    <img id="aluno-foto-display" src="${dados.alunoFoto || 'https://via.placeholder.com/150'}" class="w-full h-full object-cover">
                                </div>
                                <input type="file" id="upload-foto-aluno" accept="image/*" class="hidden" onchange="window.subirFoto(this)">
                                <button type="button" onclick="document.getElementById('upload-foto-aluno').click()" class="absolute bottom-4 right-0 bg-blue-600 p-2 rounded-full text-white shadow-lg text-[10px] hover:bg-blue-500 transition-all">📷</button>
                            </div>
                            <h1 class="text-2xl font-black text-white uppercase">${dados.alunoNome || 'Bem-vindo'}</h1>
                            <p class="text-blue-400 font-mono text-xs uppercase tracking-widest">Sua área de EXCLUSIVA</p>
                        </div>

                        <div id="container-video"></div>

                        <div class="space-y-4">
                            <div class="border-b border-gray-800 pb-2 mb-6">
                                <h2 class="text-lg font-black text-white uppercase tracking-widest">Tudo sobre você e seu cadastro</h2>
                            </div>
                            <div class="opacity-95">${config.campos}</div>
                        </div>
                    </div>
                `;

                // Bloqueio de edição, mas MANTENDO o botão de conclusão do aluno
                document.querySelectorAll('input, select, textarea').forEach(el => {
                    el.disabled = true;
                    el.classList.add('opacity-70');
                });
              
                // Renderização do Histórico Semanal
                const historico = dados.historicoTreinos || {};
                const listaHistorico = Object.keys(historico).map(data => `
                    <li class="flex justify-between text-xs border-b border-gray-800 py-2">
                        <span class="text-gray-400">${new Date(data).toLocaleDateString('pt-BR')}</span>
                        <span class="text-emerald-500 font-bold">CONCLUÍDO (${historico[data].marcadoPor})</span>
                    </li>
                `).join('');

               if (listaHistorico) {
                    document.getElementById('app').insertAdjacentHTML('beforeend', `
                        <div class="mt-8 p-4 bg-gray-900 rounded-xl border border-gray-800">
                            <h3 class="text-white font-black uppercase text-xs mb-4 tracking-widest">📜 Histórico de Treinos</h3>
                            <ul class="space-y-2">${listaHistorico}</ul>
                        </div>
                    `);
                }

                Object.keys(dados).forEach(id => {
                    const el = document.getElementById(id);
                    if (el) {
                        el.type === 'checkbox' ? el.checked = dados[id] : el.value = dados[id];
                    }
                });

                // Motor de Vídeos
                const linkTreino = dados.linkVideoTreino;
                const containerVideo = document.getElementById('container-video');
                if (containerVideo && linkTreino) {
                    const links = linkTreino.split(',');
                    containerVideo.innerHTML = `
                        <h3 class="text-sm font-bold text-white uppercase mb-4 tracking-widest text-center">📺 O que temos para você</h3>
                        <p class="text-xs text-gray-400 mb-6 text-center italic">Clique no play e veja o conteúdo exclusivo:</p>
                        ${links.map((url, i) => {
                            const u = url.trim();
                            const videoId = u.includes('youtu.be/') ? u.split('/').pop() : u.split('v=')[1]?.substring(0,11);
                            return `
                                <div class="mb-6">
                                    <iframe class="w-full h-64 rounded-xl border border-gray-800 shadow-2xl" src="https://www.youtube.com/embed/${videoId}" frameborder="0" allowfullscreen></iframe>
                                    <div class="flex items-center gap-2 p-3 mt-2 bg-[#0F1115] border border-gray-800 rounded">
                                        <input type="checkbox" onchange="window.salvarCheck('video-${i}', this.checked)" class="w-5 h-5 accent-blue-600">
                                        <label class="text-white text-xs uppercase font-bold">Treino Realizado</label>
                                    </div>
                                </div>`;
                        }).join('')}
                    `;
                }
           } catch (e) {
                console.error("Erro na renderização:", e);
                document.getElementById('app').innerHTML = "Erro ao carregar dados.";
            }
        }

        window.subirFoto = async function(input) {
            const file = input.files[0];
            if (!file) return;
            const params = new URLSearchParams(window.location.search);
            const preview = document.getElementById('aluno-foto-display');
            preview.style.opacity = '0.5';

            const formData = new FormData();
            formData.append('image', file);

            try {
                const response = await fetch('https://api.imgur.com/3/image', {
                    method: 'POST',
                    headers: { 'Authorization': 'Client-ID 546c25a59c58ad7' },
                    body: formData
                });
                const data = await response.json();
                if (data.success) {
                    preview.src = data.data.link;
                    await updateDoc(doc(db, "clients", params.get('cid'), "dados", params.get('aid')), { alunoFoto: data.data.link });
                    alert("✅ Foto atualizada!");
                }
            } catch (e) { alert("Erro no upload."); } finally { preview.style.opacity = '1'; }
        };

        // Função inteligente para ambos (Aluno e Personal)
        window.marcarConcluido = async () => {
            const params = new URLSearchParams(window.location.search);
            const cid = params.get('cid');
            const aid = params.get('aid');

            if (!cid || !aid) {
                alert("Erro: Identificação do aluno não encontrada.");
                return;
            }

            try {
                const hoje = new Date().toISOString().split('T')[0];
                const agora = new Date().toISOString();
                
                await updateDoc(doc(db, "clients", cid, "dados", aid), { 
                    [`historicoTreinos.${hoje}`]: {
                        status: "Concluído",
                        data: agora,
                        marcadoPor: "Aluno"
                    },
                    statusTreino: "Concluído",
                    dataConclusao: agora,
                    marcadoPor: "Aluno"
                });
                
                alert("✅ Treino marcado como concluído!");
                window.location.reload();
            } catch (error) {
                console.error("Erro no Firestore:", error);
                alert("Erro ao salvar no banco de dados.");
            }
        };

        window.marcarConcluidoAdmin = (id) => window.marcarConcluido(String(id));
        window.salvarCheck = async (exercicioId, isChecked) => {
    const cid = new URLSearchParams(window.location.search).get('cid');
    const aid = new URLSearchParams(window.location.search).get('aid');

    if (!cid || !aid) {
        alert("Erro: Identificação do aluno não encontrada.");
        return;
    }

    try {
        const docRef = doc(db, "clients", cid, "dados", aid, "checkins", exercicioId);
        
        if (isChecked) {
            await setDoc(docRef, {
                data: new Date().toISOString(),
                status: "realizado"
            });
        } else {
            await deleteDoc(docRef);
        }
        console.log("Check atualizado com sucesso!");
    } catch (error) {
        console.error("Erro ao salvar check: ", error);
        alert("Erro ao salvar progresso.");
    }
};
        carregarVisualizacao();
    </script>
</body>
</html>
