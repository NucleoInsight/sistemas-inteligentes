<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Ficha - Portal do Cliente</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0F1115] text-white p-4 font-sans">

    <div id="app" class="max-w-xl mx-auto">
        <div class="text-center py-10">
            <h1 class="text-xl font-black">Carregando portal exclusivo...</h1>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAMYE7ZLM4jtoVnshqowLSaSL-mYCW1lhI",
            authDomain: "sistemas-inteligentes-38cdc.firebaseapp.com",
            projectId: "sistemas-inteligentes-38cdc",
            storageBucket: "sistemas-inteligentes-38cdc.firebasestorage.app",
            messagingSenderId: "632476998816",
            appId: "1:632476998816:web:3cb6936a5e3517b09dbdc5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function carregarVisualizacao() {
            const params = new URLSearchParams(window.location.search);
            const cid = params.get('cid');
            const aid = params.get('aid');

            if (!cid || !aid) {
                document.getElementById('app').innerHTML = "Link inválido.";
                return;
            }

            try {
                const [clienteSnap, alunoSnap] = await Promise.all([
                    getDoc(doc(db, "clients", cid)),
                    getDoc(doc(db, "clients", cid, "dados", aid))
                ]);

                if (!clienteSnap.exists() || !alunoSnap.exists()) {
                    document.getElementById('app').innerHTML = "Dados não encontrados.";
                    return;
                }

                const config = clienteSnap.data().configuracaoPersonalizada;
                const dados = alunoSnap.data();

               // ESTRUTURA PREMIUM DASHBOARD
                document.getElementById('app').innerHTML = `
                    <div class="space-y-6">
                        <!-- HEADER: Saudação e Status -->
                        <div class="flex items-center justify-between p-4 bg-gray-900 rounded-xl border border-gray-800">
                            <div>
                                <h1 class="text-lg font-black text-white uppercase">Olá, ${dados.alunoNome?.split(' ')[0] || 'Aluno'}!</h1>
                                <p class="text-[9px] text-blue-400 font-bold uppercase tracking-widest">Treino de hoje: ${new Date().toLocaleDateString('pt-BR', { weekday: 'long' })}</p>
                            </div>
                            <div class="relative">
                                <img id="aluno-foto-display" src="${dados.alunoFoto || 'https://via.placeholder.com/150'}" class="w-12 h-12 rounded-full object-cover border border-blue-500 cursor-pointer" onclick="document.getElementById('upload-foto-aluno').click()">
                                <input type="file" id="upload-foto-aluno" accept="image/*" class="hidden" onchange="window.subirFoto(this)">
                            </div>
                        </div>

                        <!-- CORPO PRINCIPAL: Treino do dia -->
                        <div id="container-video"></div>

                        <!-- AÇÕES: Botão de Conclusão -->
                        <button type="button" onclick="window.marcarConcluido()" class="w-full bg-emerald-600 text-white font-black py-4 rounded-xl uppercase tracking-widest text-xs hover:bg-emerald-500 transition-all shadow-lg shadow-emerald-900/20">
                            Marcar treino de hoje como Concluído ✅
                        </button>
                        
                        <!-- RODAPÉ: Onde o JS irá injetar a ficha e o histórico -->
                        <div id="container-footer"></div>
                    </div>
                `;
                
               // Bloqueio de edição, mantendo o input de foto habilitado
                document.querySelectorAll('input, select, textarea').forEach(el => {
                    if (el.id !== 'upload-foto-aluno') {
                        el.disabled = true;
                        el.classList.add('opacity-70');
                    }
                });
              
                // Renderização do Histórico Semanal
                const historico = dados.historicoTreinos || {};
                const listaHistorico = Object.keys(historico).map(data => `
                    <li class="flex justify-between text-xs border-b border-gray-800 py-2">
                        <span class="text-gray-400">${new Date(data).toLocaleDateString('pt-BR')}</span>
                        <span class="text-emerald-500 font-bold">CONCLUÍDO (${historico[data].marcadoPor})</span>
                    </li>
                `).join('');

               // RENDERIZAÇÃO DO RODAPÉ (Menu de Acesso)
                const footer = document.getElementById('container-footer');
                if (footer) {
                    footer.innerHTML = `
                        <div class="space-y-3 pt-6 border-t border-gray-800">
                            <h3 class="text-[10px] text-gray-500 font-bold uppercase tracking-widest mb-2">Informações Adicionais</h3>
                            
                            <!-- Botão Ficha Completa -->
                            <details class="group bg-gray-900 p-4 rounded-lg border border-gray-800 cursor-pointer">
                                <summary class="font-bold text-xs uppercase text-gray-300">📂 Ver Minha Ficha Completa</summary>
                                <div class="mt-4 pt-4 border-t border-gray-800 opacity-80 text-xs">${config.campos}</div>
                            </details>

                            <!-- Botão Histórico -->
                            <details class="group bg-gray-900 p-4 rounded-lg border border-gray-800 cursor-pointer">
                                <summary class="font-bold text-xs uppercase text-gray-300">📜 Histórico de Treinos</summary>
                                <div class="mt-4 pt-4 border-t border-gray-800">
                                    <ul class="space-y-2">${listaHistorico || '<li class="text-xs text-gray-500 italic">Nenhum treino concluído ainda.</li>'}</ul>
                                </div>
                            </details>
                        </div>
                    `;
                }
                Object.keys(dados).forEach(id => {
                    const el = document.getElementById(id);
                    if (el) {
                        el.type === 'checkbox' ? el.checked = dados[id] : el.value = dados[id];
                    }
                });

                // Motor de Vídeos
                // Motor de Renderização de Treino Completo
                const container = document.getElementById('container-video');
                const rotina = dados.rotinaTreino || [];

                if (container) {
                    if (rotina.length > 0) {
                        container.innerHTML = `
                            <h3 class="text-sm font-bold text-white uppercase mb-4 tracking-widest text-center">🏋️ Seu Treino do Dia</h3>
                            ${rotina.map((ex, index) => {
                                const videoId = ex.link ? (ex.link.includes('shorts/') ? ex.link.split('shorts/')[1].split('?')[0] : (ex.link.includes('youtu.be/') ? ex.link.split('/').pop() : ex.link.split('v=')[1]?.substring(0, 11))) : null;
                                return `
                                    <div class="bg-gray-900 p-4 rounded-xl border border-gray-800 mb-4 shadow-lg">
                                        <h4 class="text-white font-black text-sm uppercase">${ex.titulo}</h4>
                                        <p class="text-blue-400 text-xs mt-1 font-bold">${ex.series} Séries x ${ex.reps} Repetições</p>
                                        <p class="text-gray-400 text-[10px] mt-1 italic">Obs: ${ex.obs || 'Sem observações'}</p>
                                        ${videoId ? `
                                            <iframe class="w-full h-48 rounded-lg mt-3" src="https://www.youtube.com/embed/${videoId}" frameborder="0" allowfullscreen></iframe>
                                        ` : '<p class="text-[9px] text-gray-600 mt-2">Sem vídeo de apoio.</p>'}
                                    </div>
                                `;
                            }).join('')}
                        `;
                    } else {
                        container.innerHTML = `<p class="text-center text-gray-500 text-xs py-4">Nenhum treino definido para hoje.</p>`;
                    }
                }
           } catch (e) {
                console.error("Erro na renderização:", e);
                document.getElementById('app').innerHTML = "Erro ao carregar dados.";
            }
        }

        window.subirFoto = async function(input) {
            const file = input.files[0];
            if (!file) return;
            const params = new URLSearchParams(window.location.search);
            const preview = document.getElementById('aluno-foto-display');
            
            // Feedback visual
            preview.style.opacity = '0.5';

            const formData = new FormData();
            formData.append('image', file);

            try {
                const response = await fetch('https://api.imgur.com/3/image', {
                    method: 'POST',
                    headers: { 'Authorization': 'Client-ID 546c25a59c58ad7' },
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.success) {
                    const novaUrl = data.data.link;
                    preview.src = novaUrl;
                    await updateDoc(doc(db, "clients", params.get('cid'), "dados", params.get('aid')), { 
                        alunoFoto: novaUrl 
                    });
                    alert("✅ Foto atualizada com sucesso!");
                } else {
                    throw new Error("Falha no upload para o Imgur");
                }
            } catch (e) { 
                console.error(e);
                alert("Erro ao subir a foto. Tente uma imagem menor."); 
            } finally { 
                preview.style.opacity = '1'; 
            }
        };

        // Função inteligente para ambos (Aluno e Personal)
        window.marcarConcluido = async () => {
            const params = new URLSearchParams(window.location.search);
            const cid = params.get('cid');
            const aid = params.get('aid');

            if (!cid || !aid) {
                alert("Erro: Identificação do aluno não encontrada.");
                return;
            }

            try {
                const hoje = new Date().toISOString().split('T')[0];
                const agora = new Date().toISOString();
                
                await updateDoc(doc(db, "clients", cid, "dados", aid), { 
                    [`historicoTreinos.${hoje}`]: {
                        status: "Concluído",
                        data: agora,
                        marcadoPor: "Aluno"
                    },
                    statusTreino: "Concluído",
                    dataConclusao: agora,
                    marcadoPor: "Aluno"
                });
                
                alert("✅ Treino marcado como concluído!");
                window.location.reload();
            } catch (error) {
                console.error("Erro no Firestore:", error);
                alert("Erro ao salvar no banco de dados.");
            }
        };

        window.marcarConcluidoAdmin = (id) => window.marcarConcluido(String(id));
        window.salvarCheck = async (exercicioId, isChecked) => {
    const cid = new URLSearchParams(window.location.search).get('cid');
    const aid = new URLSearchParams(window.location.search).get('aid');

    if (!cid || !aid) {
        alert("Erro: Identificação do aluno não encontrada.");
        return;
    }

    try {
        const docRef = doc(db, "clients", cid, "dados", aid, "checkins", exercicioId);
        
        if (isChecked) {
            await setDoc(docRef, {
                data: new Date().toISOString(),
                status: "realizado"
            });
        } else {
            await deleteDoc(docRef);
        }
        console.log("Check atualizado com sucesso!");
    } catch (error) {
        console.error("Erro ao salvar check: ", error);
        alert("Erro ao salvar progresso.");
    }
};
        carregarVisualizacao();
    </script>
</body>
</html>
