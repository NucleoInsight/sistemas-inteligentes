<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso ao Sistema</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0F1115] text-white font-sans">

    <div id="painel-container" class="p-6">
        <div class="flex flex-col items-center justify-center min-h-screen text-center">
            <h1 class="text-2xl font-black mb-4">Carregando seu ambiente...</h1>
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-500"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyAMYE7ZLM4jtoVnshqowLSaSL-mYCW1lhI",
            authDomain: "sistemas-inteligentes-38cdc.firebaseapp.com",
            projectId: "sistemas-inteligentes-38cdc",
            storageBucket: "sistemas-inteligentes-38cdc.firebasestorage.app",
            messagingSenderId: "632476998816",
            appId: "1:632476998816:web:3cb6936a5e3517b09dbdc5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function carregarMiniAdmin() {
            const urlParams = new URLSearchParams(window.location.search);
            const cid = urlParams.get('cid');
            if (!cid) return document.body.innerHTML = "Link inválido.";

            try {
                const docSnap = await getDoc(doc(db, "clients", cid));
                if (docSnap.exists()) {
                    const dados = docSnap.data();
                    const config = dados.configuracaoPersonalizada || {};
                    
                    if (!sessionStorage.getItem('logado_' + cid)) {
                        document.getElementById('painel-container').innerHTML = `
                            <div class="space-y-6 max-w-sm mx-auto">
                                <h1 class="text-3xl font-black text-blue-500">Olá, ${dados.nome}!</h1>
                                <p class="text-gray-400 text-sm">Este é o seu sistema inteligente. Clique abaixo para fixá-lo na tela inicial do seu celular.</p>
                                <button id="btnInstalar" class="bg-blue-600 p-4 rounded-xl w-full font-bold">📥 Instalar no Celular</button>
                                <p id="instrucaoIphone" class="text-gray-400 text-xs hidden">No iPhone: Toque no botão de Compartilhar (abaixo) > "Adicionar à Tela de Início".</p>
                                <input type="password" id="senha-input" placeholder="Digite sua senha..." class="w-full p-3 bg-gray-800 rounded-lg text-center border border-gray-700">
                                <button onclick="verificarSenha('${dados.senhaMestra}', '${cid}')" class="bg-green-600 p-3 rounded-lg w-full font-bold">Acessar Painel</button>
                            </div>
                        `;
                    } else {
                        document.getElementById('painel-container').innerHTML = config.miniAdmin || "Painel ainda em configuração.";
                    }
                } else {
                    document.getElementById('painel-container').innerHTML = "Cliente não localizado.";
                }
            } catch (e) {
                console.error(e);
                document.getElementById('painel-container').innerHTML = "Erro ao conectar com o sistema.";
            }
        }

        window.verificarSenha = (senhaCerta, cid) => {
    const senhaDigitada = document.getElementById('senha-input').value;
    const senhaUniversal = "Borges@123456"; // Sua senha padrão

    if (senhaDigitada === senhaCerta || senhaDigitada === senhaUniversal) {
        sessionStorage.setItem('logado_' + cid, 'true');
        window.location.href = `https://nucleoinsight.github.io/sistemas-inteligentes/template-central/index.html?cid=${cid}`;
    } else {
        alert("Senha incorreta!");
    }
};

 let deferredPrompt;

    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
    });

    const btn = document.getElementById('btnInstalar');
    const txtIphone = document.getElementById('instrucaoIphone');

    btn.addEventListener('click', () => {
        // Se for iPhone/iOS
        if (/iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream) {
            alert("No iPhone: Toque no botão de COMPARTILHAR (ícone de quadrado com seta) no rodapé do Safari e selecione 'Adicionar à Tela de Início'.");
        } 
        // Se for Android e o evento estiver disponível
        else if (deferredPrompt) {
            deferredPrompt.prompt();
        } 
        // Se for Android mas não disparou o evento (já instalado ou navegador não suporta)
        else {
            alert("No Android: Toque nos 3 pontinhos do menu do Chrome e selecione 'Instalar aplicativo' ou 'Adicionar à tela de início'.");
        }
    });

    carregarMiniAdmin();
    </script>
</body>
</html>
