<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuração de Central — Borges Soluções</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0F1115] text-white p-6 flex justify-center min-h-screen">

    <div class="w-full max-w-md bg-[#171A21] p-6 rounded-2xl border border-gray-800 shadow-xl h-fit">
        <h2 class="text-xl font-black mb-6 uppercase text-blue-500">Configurar Central</h2>
        
        <form id="form-lead" class="space-y-4 text-sm">
            <div>
                <label class="block text-[10px] text-gray-400 uppercase font-bold">Nome do Cliente</label>
                <input type="text" id="cli-nome" required class="w-full bg-[#0F1115] border border-gray-700 rounded px-3 py-2 text-white">
            </div>

            <div class="grid grid-cols-2 gap-2">
                <div>
                    <label class="block text-[10px] text-gray-400 uppercase font-bold">1. Nicho</label>
                    <select id="cli-nicho" onchange="window.atualizarTemas(this.value)" class="w-full bg-[#0F1115] border border-gray-700 rounded px-2 py-2 text-white">
                        <option value="estetica">Estética</option>
                        <option value="performance">Performance</option>
                        <option value="profissionais">Profissionais</option>
                        <option value="eventos">Eventos</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] text-gray-400 uppercase font-bold">2. Tema/Tag</label>
                    <select id="cli-tag" class="w-full bg-[#0F1115] border border-gray-700 rounded px-2 py-2 text-white"></select>
                </div>
            </div>

            <div>
                <label class="block text-[10px] text-gray-400 uppercase font-bold">Cor Principal</label>
                <input type="color" id="cli-cor" value="#3B82F6" class="w-full h-[38px] bg-[#0F1115] border border-gray-700 rounded px-1">
            </div>

            <div>
                <label class="block text-[10px] text-gray-400 uppercase font-bold">Upload da Logo</label>
                <div class="flex gap-2">
                    <input type="text" id="tpl-logo" placeholder="URL da logo..." class="w-full bg-[#0F1115] border border-gray-700 rounded px-3 py-2 text-white">
                    <input type="file" id="upload-logo" accept="image/*" class="hidden" onchange="window.subirLogo(this)">
                    <button type="button" onclick="document.getElementById('upload-logo').click()" class="bg-gray-800 px-4 py-2 rounded">📷</button>
                </div>
                <div id="preview-logo" class="text-[9px] text-gray-500 mt-1"></div>
            </div>

            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-lg mt-4 uppercase text-xs">
                Enviar Dados
            </button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAMYE7ZLM4jtoVnshqowLSaSL-mYCW1lhI",
            authDomain: "sistemas-inteligentes-38cdc.firebaseapp.com",
            projectId: "sistemas-inteligentes-38cdc",
            storageBucket: "sistemas-inteligentes-38cdc.firebasestorage.app",
            messagingSenderId: "632476998816",
            appId: "1:632476998816:web:3cb6936a5e3517b09dbdc5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Atualizar temas dinamicamente
        window.atualizarTemas = (nicho) => {
            const temas = {
                estetica: ["Botox", "Limpeza de Pele", "Massagem", "Lash/Cílios", "Microblading"],
                performance: ["Jiu-Jitsu", "Capoeira", "Musculação", "Corrida", "Yoga"],
                profissionais: ["Nutrição", "Psicologia", "Mentoria", "Reforma", "Eletricista"],
                eventos: ["Buffet", "Fotografia", "Locação de Espaço", "Decoração"]
            };
            document.getElementById('cli-tag').innerHTML = temas[nicho].map(t => `<option value="${t.toLowerCase()}">${t}</option>`).join('');
        };
        window.atualizarTemas('estetica'); // Inicializa

        // Upload do Imgur
        window.subirLogo = async function(input) {
            const file = input.files[0];
            const preview = document.getElementById('preview-logo');
            const campoLogo = document.getElementById('tpl-logo');
            preview.innerText = 'Upload... ⏳';

            const formData = new FormData();
            formData.append('image', file);
            const response = await fetch('https://api.imgur.com/3/image', {
                method: 'POST',
                headers: { 'Authorization': 'Client-ID 546c25a59c58ad7' },
                body: formData
            });
            const data = await response.json();
            if (data.success) {
                campoLogo.value = data.data.link;
                preview.innerHTML = `<span class="text-green-500">Logo enviada com sucesso!</span>`;
            }
        };

        // Salvar no Banco (Coleção 'leads')
        document.getElementById("form-lead").addEventListener("submit", async (e) => {
            e.preventDefault();
            try {
                await addDoc(collection(db, "leads"), {
                    nome: document.getElementById("cli-nome").value,
                    nicho: document.getElementById("cli-nicho").value,
                    tag: document.getElementById("cli-tag").value,
                    cor: document.getElementById("cli-cor").value,
                    logo: document.getElementById("tpl-logo").value,
                    status: "Lead",
                    dataCriacao: new Date().toISOString()
                });
                alert("✅ Dados enviados com sucesso! Em breve entraremos em contato.");
                e.target.reset();
            } catch (err) {
                alert("Erro ao enviar dados.");
            }
        });
    </script>
</body>
</html>
