<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carregando Central Inteligente...</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #0F1115; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #171A21; border-radius: 3px; }
    </style>
</head>
<body class="min-h-screen bg-[#0F1115] text-white font-sans custom-scrollbar flex flex-col justify-between">
<div id="modal-biblioteca" class="fixed inset-0 bg-black/80 hidden z-50 flex items-center justify-center p-4">
    <div class="bg-[#171A21] border border-gray-800 rounded-xl w-full max-w-lg p-6 max-h-[80vh] overflow-y-auto">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-white font-bold uppercase text-xs">Minha Biblioteca de Vídeos</h3>
            <button onclick="document.getElementById('modal-biblioteca').classList.add('hidden')" class="text-gray-500 hover:text-white">✕</button>
        </div>
        <div id="lista-modal-videos" class="space-y-3"></div>
    </div>
</div>
    <main class="flex-1 w-full max-w-4xl mx-auto p-4 md:p-6" id="conteudo-central">
        
        <div id="loading" class="flex flex-col items-center justify-center py-20 space-y-4">
            <div class="w-10 h-10 border-4 border-t-blue-500 border-gray-800 rounded-full animate-spin"></div>
            <p class="text-xs text-gray-400 uppercase tracking-widest font-mono">Conectando à Fábrica NoSQL...</p>
        </div>

        <div id="interface-dinamica" class="hidden space-y-6">
            
            <div class="p-6 md:p-8 rounded-2xl border border-gray-800/60 relative overflow-hidden flex flex-col items-center text-center space-y-3" id="custom-header">
                <div class="absolute inset-0 opacity-10 pointer-events-none" id="custom-bg-gradient"></div>
                <div class="w-20 h-20 bg-white rounded-full p-1 border-2 shadow-xl overflow-hidden flex items-center justify-center" id="custom-border-logo">
                    <img id="custom-logo" src="" alt="Logo Cliente" class="w-full h-full object-cover">
                </div>
                <div>
                    <h1 class="text-xl md:text-2xl font-black uppercase tracking-wide" id="custom-nome">Carregando...</h1>
                    <p class="text-xs text-gray-400 mt-1 font-mono uppercase" id="custom-subtitulo">Painel Operacional Ativo</p>
                </div>
            </div>

           <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                
    <div id="container-painel-gestor" class="hidden mt-0 mb-6 md:col-span-3"></div>

    <div id="container-dinamico" class="bg-[#171A21] p-5 rounded-xl border border-gray-800/80 md:col-span-2"></div>

    <div id="container-apresentacao"></div>
                
</div>
        </div>
    </main>

    <footer class="bg-[#171A21] border-t border-gray-800/60 text-center py-4 text-[10px] text-gray-500 font-mono mt-6">
        <p>POWERED BY BORGES SISTEMAS INTELIGENTES — INFRAESTRUTURA ESCALÁVEL</p>
    </footer>

    <div onclick="document.getElementById('loginOverlay').style.display='flex'" class="fixed bottom-5 right-5 cursor-pointer opacity-50 hover:opacity-100">⚙️</div>

    <div id="loginOverlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:999; flex-direction:column; align-items:center; justify-content:center;">
        <h2 class="text-white mb-4">ACESSO ADMINISTRATIVO</h2>
        <input type="password" id="senhaInput" placeholder="Senha Mestra" class="bg-gray-800 text-white p-2 rounded mb-4 text-center">
        <button onclick="logarAdmin()" class="bg-blue-600 text-white px-6 py-2 rounded">ACESSAR</button>
        <button class="mt-4 text-gray-500" onclick="document.getElementById('loginOverlay').style.display='none'">Fechar</button>
    </div>

<script type="module">
       import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
       import { getFirestore, doc, getDoc, addDoc, collection, setDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
       import { getAuth } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    //CARREGAR EXERCÍCIOS
     window.listaExercicios = [];
    
     window.logarAdmin = async () => {
            const senha = document.getElementById("senhaInput").value.trim();
            const senhaMestraNoBanco = String(window.senhaMestraCorreta || "").trim();
            const senhaPadrao = "Borges@123456";

            if (senha === senhaMestraNoBanco || senha === senhaPadrao) {
                document.getElementById('loginOverlay').style.display = 'none';
                
                const painelGestor = document.getElementById('container-painel-gestor');
                if (painelGestor) {
                    painelGestor.classList.remove('hidden');
                    // Liga os dois motores: o KPI e a Lista de Alunos
                    window.atualizarDashboard(); 
                    window.renderizarGestaoAlunos(); 
                }
                
                alert("✅ Acesso Liberado ao Painel do Mestre!");
            } else {
                alert("❌ Senha incorreta.");
            }
        };
        const firebaseConfig = {
            apiKey: "AIzaSyAMYE7ZLM4jtoVnshqowLSaSL-mYCW1lhI",
            authDomain: "sistemas-inteligentes-38cdc.firebaseapp.com",
            projectId: "sistemas-inteligentes-38cdc",
            storageBucket: "sistemas-inteligentes-38cdc.firebasestorage.app",
            messagingSenderId: "632476998816",
            appId: "1:632476998816:web:3cb6936a5e3517b09dbdc5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        // Expondo funções e o auth para o escopo global do navegador
        window.db = db;
        window.auth = auth;
        window.doc = doc;
        window.getDoc = getDoc;
        window.setDoc = setDoc;
        window.updateDoc = updateDoc;
        window.addDoc = addDoc;
        window.collection = collection;
        window.deleteDoc = deleteDoc;
        let configCliente = {};

        async function buscarConfiguracaoDoCliente(dadosCliente) {
            try {
                // Se o cliente tem a configuração salva (snapshot), usamos ela. 
                // Se não tiver (cliente antigo), buscamos no template original (fallback).
                const data = dadosCliente.configuracaoPersonalizada || {};
                
                configCliente = {
                    nome: dadosCliente.nome || data.nome,
                    logo: data.logo || "",
                    cor: dadosCliente.cor || data.cor || "#3B82F6",
                    tituloForm: data.titulo || "Ficha de Registro",
                    textoApresentacao: data.apresentacao || "",
                    htmlCampos: data.campos || ""
                };
            } catch (e) { console.error("Erro ao configurar cliente:", e); }
        }

    async function inicializarCentralDinamica() {
            const params = new URLSearchParams(window.location.search);
            const cid = params.get('cid'); 
            if (!cid) return;
            
            const clienteSnap = await getDoc(doc(db, "clients", cid));
            if (!clienteSnap.exists()) return;

            const dados = clienteSnap.data();
            window.senhaMestraCorreta = dados.senhaMestra;
            window.statusCliente = dados.status;

            const config = dados.configuracaoPersonalizada || {};
            
            document.title = `${dados.nome} — Central`;
            document.getElementById("custom-nome").innerText = dados.nome;
            document.getElementById("custom-logo").src = config.logo || "";
            
            // Injeta o HTML vindo da Fábrica
            document.getElementById("container-apresentacao").innerHTML = config.apresentacao || "";
            document.getElementById("container-dinamico").innerHTML = config.campos || "";
            
            // NOVO: Força a exibição do Painel do Gestor se ele estiver configurado
            const painelGestor = document.getElementById("container-painel-gestor");
            if(config.miniAdmin) {
                painelGestor.innerHTML = config.miniAdmin;
            }

            console.log("🛠️ HTML Injetado com sucesso.");
            document.getElementById("loading").classList.add("hidden");
            document.getElementById("interface-dinamica").classList.remove("hidden");

            // FORÇA O CARREGAMENTO DOS MOTORES COM O CID CORRETO
            window.atualizarDashboard();
            window.renderizarGestaoAlunos();
            
            // GATILHO AUTOMÁTICO DE CARREGAMENTO
            window.atualizarDashboard();
            window.renderizarGestaoAlunos();
        }

        window.registrarAcao = async (exercicio) => {
            try {
                const params = new URLSearchParams(window.location.search);
                const cid = params.get('cid');
                
                await addDoc(collection(db, "notificacoes"), {
                    cid: cid,
                    exercicio: exercicio,
                    data: new Date().toISOString(),
                    status: "Concluido"
                });
                
                alert("✅ Exercício registrado com sucesso!");
            } catch (e) {
                console.error("Erro ao registrar:", e);
                alert("Erro ao salvar notificação.");
            }
        };

    window.salvarTreino = async (id, feedback) => {
        try {
            // Usa o ID que você recebe pela URL (?cid=...)
            const docRef = doc(db, "clients", id);
            await updateDoc(docRef, {
                "treinoDiario": {
                    feedback: feedback,
                    data: new Date().toISOString(),
                    status: "Concluído"
                }
            });
            alert("✅ Treino registrado com sucesso!");
        } catch (e) {
            console.error("Erro ao salvar:", e);
        }
    };

    // --- COMANDO PARA DISPARAR O MOTOR ---
    inicializarCentralDinamica();

    // MOTOR INTELIGENTE CENTRALIZADO
   window.acaoInteligente = async (tipo, subcolecao = 'ficha') => {
        const params = new URLSearchParams(window.location.search);
        const cid = params.get('cid');
        if (!cid) return alert("Erro: ID do cliente não encontrado.");
        
        // Captura todos os inputs da página, filtrando lixo
        const inputs = document.querySelectorAll('input, select, textarea');
        let dados = {};
        const camposParaIgnorar = [
            'novoExercicioObs', 'novoExercicioReps', 'novoExercicioSeries', 
            'novoExercicioTitulo', 'senhaInput', 'buscaAluno', 'marcadoPor'
        ];

        inputs.forEach(i => { 
            if (i.id && !camposParaIgnorar.includes(i.id)) {
                dados[i.id] = i.type === 'checkbox' ? i.checked : i.value; 
            }
        });

        if (tipo === 'salvar') {
            const nome = document.getElementById('alunoNome')?.value;
            if (!nome || nome.trim() === "") {
                alert("⚠️ Digite o nome do cliente/aluno ou clique em Editar na lista.");
                return;
            }
            try {
                const idOculto = document.getElementById('id-ficha-oculto')?.value;
                const idFicha = idOculto || `ficha-${Date.now()}`;
                const docRef = doc(db, "clients", cid, "dados", idFicha);
                
                // 1. Recupera lista atual do banco
                const docSnap = await getDoc(docRef);
                let listaVideos = docSnap.exists() ? (docSnap.data().videos || []) : [];
                
                // Captura vídeos apenas se o usuário preencheu os campos antes de salvar
                const t = document.getElementById('videoTitulo')?.value;
                const l = document.getElementById('linkVideoTreino')?.value;
                if (t && l && !listaVideos.find(v => v.link === l)) {
                    listaVideos.push({ titulo: t, link: l, data: new Date().toISOString() });
                }

               // 3. Remove campos temporários e prepara dados para salvar
                delete dados.videoTitulo;
                delete dados.linkVideoTreino;
                
               // Adiciona os dados novos à estrutura
                dados.videos = listaVideos;
                dados.rotinaTreino = window.rotinaTemporaria;
                
                await setDoc(docRef, dados, { merge: true });
                alert(`✅ Ficha salva com ${listaVideos.length} vídeos e ${window.rotinaTemporaria.length} exercícios!`);
                
                // Reset da lista de exercícios na memória e no HTML
                window.rotinaTemporaria = [];
                document.getElementById('container-rotina-preview').innerHTML = '<p class="text-[9px] text-gray-500 uppercase italic">Nenhum exercício adicionado.</p>';
                
                // Reset do formulário e limpeza do ID para evitar duplicidade
                const inputsReset = document.querySelectorAll('input, select, textarea');
                inputsReset.forEach(i => { if (i.id !== 'id-ficha-oculto') i.value = ''; });
                document.getElementById('id-ficha-oculto').value = '';
                
                // Atualiza a lista visualmente
                window.renderizarGestaoAlunos();
           } catch (e) {
                console.error("Erro ao salvar:", e);
                alert("Erro ao salvar os dados.");
            }
        }
        
        else if (tipo === 'whatsapp') {
            const nome = dados.alunoNome || "Cliente";
            const msg = `Olá! Me chamo ${nome} e gostaria de falar sobre meu cadastro.`;
            window.open(`https://wa.me/5575998649927?text=${encodeURIComponent(msg)}`, '_blank');
        }
    };

    // MOTOR DE CARREGAMENTO UNIVERSAL
   window.carregarDados = async (subcolecao = 'ficha') => {
        const params = new URLSearchParams(window.location.search);
        const cid = params.get('cid');
        if (!cid) return;

        try {
            const docRef = doc(db, "clients", cid, "dados", subcolecao);
            const docSnap = await getDoc(docRef);

            if (docSnap.exists()) {
                const dados = docSnap.data();
                
                // Função recursiva de espera para garantir que os inputs existam no DOM
                const preencher = () => {
                    const elTitulo = document.getElementById('videoTitulo');
                    if (!elTitulo) {
                        setTimeout(preencher, 100);
                        return;
                    }

                    const container = document.getElementById('container-conteudos');
                    if (container) container.innerHTML = ''; 

                    Object.keys(dados).forEach(id => {
                        const el = document.getElementById(id);
                        if (el) {
                            if (el.type === 'checkbox') el.checked = dados[id];
                            else el.value = dados[id];
                        }
                    });

                    const elLink = document.getElementById('link-acesso-aluno');
                    if (elLink) {
                        elLink.value = `https://nucleoinsight.github.io/sistemas-inteligentes/visualizar_cliente_e_aluno.html?cid=${cid}&aid=${subcolecao}`;
                    }

                   // Garante que o ID da ficha seja setado antes de qualquer outra ação
                    const elIdOculto = document.getElementById('id-ficha-oculto');
                    if (elIdOculto) {
                        elIdOculto.value = subcolecao;
                    }

                  // Renderização de todos os vídeos (Array completo)
                    const containerPlayers = document.getElementById('container-players-renderizados');
                    if (containerPlayers) {
                        containerPlayers.innerHTML = ''; // Limpa players anteriores
                        if (dados.videos && Array.isArray(dados.videos)) {
                            dados.videos.forEach(v => {
                                const videoId = v.link.split('v=')[1] || v.link.split('/').pop().split('?')[0];
                                const div = document.createElement('div');
                                div.className = "mt-4 p-2 border border-gray-800 rounded";
                                div.innerHTML = `
                                    <p class="text-xs font-bold text-blue-400 mb-1">${v.titulo}</p>
                                    <iframe class="w-full h-48 rounded-lg" src="https://www.youtube.com/embed/${videoId}" frameborder="0" allowfullscreen></iframe>
                                    <div class="flex gap-2 mt-2">
                                        <button onclick="window.salvarNaBiblioteca('${v.titulo}', '${v.link}', 'Privado')" class="flex-1 bg-blue-900/30 text-blue-400 text-[9px] font-bold uppercase py-1 rounded border border-blue-500/20">
                                            ⭐ Salvar (Privado)
                                        </button>
                                        <button onclick="window.salvarNaBiblioteca('${v.titulo}', '${v.link}', 'Global')" class="flex-1 bg-green-900/30 text-green-400 text-[9px] font-bold uppercase py-1 rounded border border-green-500/20">
                                            🌐 Salvar (Global)
                                        </button>
                                    </div>
                                    <p class="text-[8px] text-gray-500 mt-1 italic">*Privado: Só você vê. Global: Todos os profissionais acessam.</p>
                                `;
                                containerPlayers.appendChild(div);
                            });
                        }
                    }
                    console.log(`✅ Dados carregados com sucesso para: ${subcolecao}`);
                };

                preencher();
            }
        } catch (e) {
            console.error("Erro ao carregar dados:", e);
        }
    };

    // --- MOTOR DE KPIs CORRIGIDO ---
    window.atualizarDashboard = async () => {
        try {
            const { collection, getDocs } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js");
            const params = new URLSearchParams(window.location.search);
            const cid = params.get('cid');
            if (!cid) return;

            const snapshot = await getDocs(collection(db, "clients", cid, "dados"));
            
            let total = 0;
            let debito = 0;

            snapshot.forEach(doc => {
                total++;
                if (doc.data().statusPagamento === 'Debito') {
                    debito++;
                }
            });

            const elAlunos = document.getElementById('kpi-total-alunos');
            const elInad = document.getElementById('kpi-inadimplentes');
            
            if (elAlunos) elAlunos.innerText = total;
            if (elInad) elInad.innerText = debito;
            
            console.log(`✅ KPIs atualizados: Total=${total}, Débitos=${debito}`);
        } catch (e) {
            console.error("Erro ao atualizar KPIs:", e);
        }
    };

    window.renderizarGestaoAlunos = async () => {
    const { collection, getDocs } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js");
    const params = new URLSearchParams(window.location.search);
    const cid = params.get('cid');
    
    const snapshot = await getDocs(collection(db, "clients", cid, "dados"));
    const painel = document.getElementById('container-painel-gestor');
    
    // Identifica ou cria a área específica da LISTA para não apagar o resto do painel
    let listaArea = document.getElementById('area-lista-alunos');
    if (!listaArea) {
        listaArea = document.createElement('div');
        listaArea.id = 'area-lista-alunos';
        painel.appendChild(listaArea);
    }
    
    let alunos = [];
    snapshot.forEach(doc => alunos.push({ id: doc.id, ...doc.data() }));

    const html = `
        <div class="mt-6 bg-[#171A21] p-4 rounded-xl border border-gray-700">
            <h3 class="text-white font-bold mb-4 uppercase text-xs">Lista de Alunos (${alunos.length})</h3>
            <input type="text" id="buscaAluno" placeholder="🔍 Pesquisar nome..." 
                class="w-full bg-gray-900 border border-gray-800 rounded p-2 text-white text-xs mb-3"
                onkeyup="window.filtrarAlunos()">
            <div id="lista-alunos-scroll" class="space-y-2 overflow-y-auto custom-scrollbar pr-2" style="height: 60vh;">
                ${alunos.map(d => `
                    <div class="aluno-item flex justify-between items-center bg-gray-900 p-3 rounded border ${d.statusPagamento === 'Debito' ? 'border-red-500/50' : 'border-gray-800'} text-xs">
                        <div class="flex flex-col">
                            <span class="nome-aluno text-gray-300 font-bold">${d.alunoNome || 'Sem Nome'}</span>
                            <span class="text-[9px] ${d.statusPagamento === 'Debito' ? 'text-red-500' : 'text-emerald-500'} font-black uppercase">
                                ${d.statusPagamento === 'Debito' ? '🔴 Em Débito' : '🟢 Em Dia'}
                            </span>
                        </div>
                        <div class="flex gap-2">
                            ${d.statusPagamento === 'Debito' ? `
                                <button type="button" onclick="window.registrarPagamento('${d.id}', 'Pago')" class="bg-emerald-900/30 text-emerald-400 px-2 py-1 rounded border border-emerald-500/20">Pagar</button>
                            ` : ''}
                            <button type="button" onclick="window.excluirAluno('${d.id}')" class="text-red-500 hover:text-red-300 underline">Excluir</button>
                            <button type="button" onclick="window.carregarDados('${d.id}')" class="text-blue-400 underline">Editar</button>
                            <button type="button" onclick="window.marcarConcluidoAdmin('${d.id}')" class="text-emerald-400 underline">Concluir Presencial</button>
                            <button type="button" onclick="window.copiarConviteParaCadastro('${d.id}', '${d.alunoNome}')" class="text-purple-400 underline">Copiar Cadastro</button>
                            <button type="button" onclick="window.copiarGatilhoAluno('${d.alunoNome}', 'https://nucleoinsight.github.io/sistemas-inteligentes/template-central/index.html?cid=' + new URLSearchParams(window.location.search).get('cid'))" class="text-green-400 underline">Enviar Ficha</button>
                        </div>
                    </div>
                `).join('')}
            </div>
        </div>`;
    
    listaArea.innerHTML = html;
    console.log("✅ Lista de alunos re-renderizada (Painel mantido).");
};
    
    window.filtrarAlunos = () => {
        const termo = document.getElementById('buscaAluno').value.toLowerCase();
        const itens = document.querySelectorAll('.aluno-item');
        itens.forEach(item => {
            const nome = item.querySelector('.nome-aluno').innerText.toLowerCase();
            item.style.display = nome.includes(termo) ? 'flex' : 'none';
        });
    };

    window.registrarPagamento = async (idFicha, status) => {
        const params = new URLSearchParams(window.location.search);
        const cid = params.get('cid');
        if (!cid) return;

        try {
            await updateDoc(doc(db, "clients", cid, "dados", idFicha), { statusPagamento: status });
            alert("✅ Status atualizado!");
            
            // Recarrega o painel e os KPIs para refletir a mudança na hora
            window.atualizarDashboard();
            
            // Limpa o painel e renderiza novamente a lista atualizada
            const painel = document.getElementById('container-painel-gestor');
            const lista = painel.querySelector('.mt-6');
            if (lista) lista.remove();
            window.renderizarGestaoAlunos();
            
        } catch (e) {
            console.error("Erro ao registrar pagamento:", e);
            alert("Erro ao atualizar status.");
        }
    };
    
    // NOVO: GATILHO PARA ALUNOS
   window.copiarGatilhoAluno = (nomeAluno, linkFormulario) => {
        if (!linkFormulario || linkFormulario.includes("undefined")) {
            alert("⚠️ Erro: O link do aluno não foi gerado corretamente. Verifique o ID do aluno.");
            return;
        }

        const texto = `*🚀 ACESSE SUA FICHA DE ACOMPANHAMENTO*\n\n` +
                      `Olá, ${nomeAluno || 'aluno(a)'}!\n\n` +
                      `Para acessar seus dados:\n\n` +
                      `${linkFormulario}\n\n` +
                      `Qualquer dúvida, estou à disposição!`;
        
        navigator.clipboard.writeText(texto).then(() => {
            alert("✅ Texto formatado para WhatsApp copiado! Agora é só colar para o aluno.");
        }).catch(err => {
            console.error('Erro ao copiar:', err);
            alert("Erro ao copiar o texto.");
        });
    };

    window.copiarLinkDoInput = () => {
    const input = document.getElementById('link-acesso-aluno');
    navigator.clipboard.writeText(input.value).then(() => {
        alert("✅ Link copiado com sucesso!");
    }).catch(err => {
        console.error('Erro ao copiar: ', err);
        alert("Erro ao copiar o link.");
    });
};
    </script>

    <script>
    // Renderização automática dos players ao carregar o aluno
                    const containerPlayers = document.getElementById('container-players-renderizados');
                    if (containerPlayers) {
                        containerPlayers.innerHTML = ''; // Limpa players anteriores
                        if (dados.videos && Array.isArray(dados.videos)) {
                            dados.videos.forEach(v => {

        // FUNÇÃO PARA SALVAR VÍDEO NA BIBLIOTECA (GLOBAL OU PRIVADA)
window.salvarNaBiblioteca = async (titulo, link, tipo) => {
    const container = document.createElement('div');
    container.className = 'fixed inset-0 bg-black bg-opacity-90 flex items-center justify-center z-50 p-4';
    container.innerHTML = `
        <div class="bg-gray-900 p-6 rounded-2xl border border-blue-500 w-full max-w-sm">
            <h2 class="text-white font-bold text-lg mb-4">Organizar seu vídeo</h2>
            <label class="text-[9px] text-gray-500 uppercase font-bold">1. Qual o Nicho?</label>
            <select id="nicho-select" class="w-full bg-black text-white p-3 mb-4 rounded border border-gray-700" onchange="window.atualizarTemas(this.value)">
                <option value="estetica">Estética e Beleza</option>
                <option value="performance">Esporte e Performance</option>
                <option value="profissionais">Serviços e Consultoria</option>
                <option value="eventos">Eventos e Lazer</option>
            </select>
            <label class="text-[9px] text-gray-500 uppercase font-bold">2. Escolha o Tema específico:</label>
            <select id="tag-select" class="w-full bg-black text-white p-3 mb-6 rounded border border-gray-700">
            </select>
            <button id="btn-confirmar-salvar" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold">SALVAR VÍDEO</button>
        </div>
    `;
    document.body.appendChild(container);

    window.atualizarTemas = (nicho) => {
        const temas = {
            estetica: ["Botox", "Limpeza de Pele", "Massagem", "Lash/Cílios", "Microblading"],
            performance: ["Jiu-Jitsu", "Capoeira", "Musculação", "Corrida", "Yoga"],
            profissionais: ["Nutrição", "Psicologia", "Mentoria", "Reforma", "Eletricista"],
            eventos: ["Buffet", "Fotografia", "Locação de Espaço", "Decoração"]
        };
        document.getElementById('tag-select').innerHTML = temas[nicho].map(t => `<option value="${t.toLowerCase()}">${t}</option>`).join('');
    };
    window.atualizarTemas('estetica');

    const confirmar = await new Promise((resolve) => {
        document.getElementById('btn-confirmar-salvar').onclick = () => resolve(true);
    });

    const nicho = document.getElementById('nicho-select').value;
    const tag = document.getElementById('tag-select').value;
    document.body.removeChild(container);

    if (!confirmar) return;

    const params = new URLSearchParams(window.location.search);
    const personalId = params.get('cid');
    const destinoId = tipo === 'Global' ? "EPaByse2kuWCpsfAeF7Kn409MhI3" : personalId;
    
    try {
        const idVideo = "video-" + Date.now();
        const path = (tipo === 'Global') ? ["owners", destinoId, "nichos", nicho, "videos", idVideo] : ["owners", destinoId, "biblioteca_videos", idVideo];
        
        await setDoc(doc(db, ...path), {
            titulo: titulo,
            link: link,
            nicho: nicho,
            tags: [tag],
            dataCadastro: new Date().toISOString()
        });
        alert(`✅ Vídeo organizado em ${nicho.toUpperCase()} > ${tag.toUpperCase()}!`);
    } catch (e) {
        alert("Erro ao salvar.");
    }
};

window.abrirModalBiblioteca = async (nicho = "global") => {
    const modal = document.getElementById('modal-biblioteca');
    const lista = document.getElementById('lista-modal-videos');
    modal.classList.remove('hidden');

    if (!document.getElementById('container-nichos')) {
        lista.insertAdjacentHTML('beforebegin', `
            <div id="container-nichos" class="flex flex-col gap-2 mb-4">
                <button onclick="window.abrirModalBiblioteca('global')" class="bg-yellow-600 text-white p-2 rounded font-bold">🌐 BIBLIOTECA GLOBAL</button>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="window.abrirModalBiblioteca('estetica')" class="bg-gray-800 text-white p-2 rounded text-[10px]">ESTÉTICA</button>
                    <button onclick="window.abrirModalBiblioteca('performance')" class="bg-gray-800 text-white p-2 rounded text-[10px]">PERFORMANCE</button>
                    <button onclick="window.abrirModalBiblioteca('profissionais')" class="bg-gray-800 text-white p-2 rounded text-[10px]">PROFISSIONAIS</button>
                    <button onclick="window.abrirModalBiblioteca('eventos')" class="bg-gray-800 text-white p-2 rounded text-[10px]">EVENTOS</button>
                </div>
            </div>
        `);
    }

    const { collection, getDocs } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js");
    const params = new URLSearchParams(window.location.search);
    const personalId = params.get('cid');
    
    lista.innerHTML = '<p class="text-gray-500 text-xs">Carregando ' + nicho + '...</p>';
    
    const caminho = (nicho === 'privado') ? ["owners", personalId, "biblioteca_videos"] : ["owners", "EPaByse2kuWCpsfAeF7Kn409MhI3", "nichos", nicho, "videos"];
    
    const querySnapshot = await getDocs(collection(db, ...caminho));
    lista.innerHTML = '';
    
    if (nicho !== 'privado') {
        lista.innerHTML += `<div onclick="window.abrirModalBiblioteca('privado')" class="bg-blue-900 p-3 mb-4 rounded text-white text-xs font-bold text-center cursor-pointer uppercase">⭐ Ver meus vídeos privados</div>`;
    }

    querySnapshot.forEach((doc) => {
        const video = doc.data();
        const div = document.createElement('div');
        div.className = "bg-[#0F1115] p-4 rounded border border-gray-700 hover:border-blue-500 transition mb-3 cursor-pointer";
        div.innerHTML = `<div class="text-white text-sm font-bold">${video.titulo}</div><div class="text-[10px] text-gray-500 uppercase">${video.nicho || ''} • ${video.tags?.[0] || ''}</div>`;
        div.onclick = () => {
            document.getElementById('videoTitulo').value = video.titulo;
            document.getElementById('linkVideoTreino').value = video.link;
            modal.classList.add('hidden');
            const videoId = video.link.split('v=')[1] || video.link.split('/').pop().split('?')[0];
            document.getElementById('container-players-renderizados').innerHTML = `<iframe class="w-full h-48 rounded-lg" src="https://www.youtube.com/embed/${videoId}" frameborder="0" allowfullscreen></iframe>`;
        };
        lista.appendChild(div);
    });
};

       window.rotinaTemporaria = []; 

        window.adicionarExercicioNaRotina = () => {
            const titulo = document.getElementById('novoExercicioTitulo').value;
            const series = document.getElementById('novoExercicioSeries').value;
            const reps = document.getElementById('novoExercicioReps').value;
            const obs = document.getElementById('novoExercicioObs').value;
            const link = document.getElementById('linkVideoTreino').value;
            const dia = document.getElementById('rotinaDiaSelect').value;

            if (!titulo || !series || !reps) {
                alert("Preencha título, séries e repetições!");
                return;
            }

            window.rotinaTemporaria.push({ dia, titulo, series, reps, obs, link });
            
            // Limpar campos
            document.getElementById('novoExercicioTitulo').value = '';
            document.getElementById('novoExercicioSeries').value = '';
            document.getElementById('novoExercicioReps').value = '';
            document.getElementById('novoExercicioObs').value = '';
            document.getElementById('linkVideoTreino').value = '';
            
            window.renderizarPreviewRotina();
        };

        window.renderizarPreviewRotina = () => {
            const container = document.getElementById('container-rotina-preview');
            container.innerHTML = window.rotinaTemporaria.map((ex, i) => `
                <div class="flex justify-between items-center bg-black p-2 rounded text-[9px] text-white">
                    <span>${ex.dia} - ${ex.titulo} (${ex.series}x${ex.reps})</span>
                    <button type="button" onclick="window.removerExercicio(${i})" class="text-red-500 font-bold px-2">X</button>
                </div>
            `).join('');
        };

        window.removerExercicio = (index) => {
            window.rotinaTemporaria.splice(index, 1);
            window.renderizarPreviewRotina();
        };

        window.atualizarFeedbackKPI = async () => {
    const params = new URLSearchParams(window.location.search);
    const cid = params.get('cid');
    const { collection, getDocs } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js");
    
    // Busca em todos os alunos
    const snapshot = await getDocs(collection(db, "clients", cid, "dados"));
    let alertas = [];

    snapshot.forEach(doc => {
        const d = doc.data();
        const historico = d.historicoTreinos || {};
        const datas = Object.keys(historico).sort((a, b) => new Date(b) - new Date(a));
        
        if (datas.length > 0) {
            const ultimaData = datas[0];
            const ultimoFeedback = historico[ultimaData];
            if (ultimoFeedback.intensidade === "Muito Difícil" || ultimoFeedback.feedback) {
                alertas.push(`${d.alunoNome}: ${ultimoFeedback.intensidade}`);
            }
        }
    });

    const el = document.getElementById('kpi-feedback-alerta');
    if (el) {
        el.innerHTML = alertas.length > 0 ? alertas.join('<br>') : "Tudo ok com os treinos!";
    }
};
