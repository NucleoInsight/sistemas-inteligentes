<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carregando Central Inteligente...</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #0F1115; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #171A21; border-radius: 3px; }
    </style>
</head>
<body class="min-h-screen bg-[#0F1115] text-white font-sans custom-scrollbar flex flex-col justify-between">

    <main class="flex-1 w-full max-w-4xl mx-auto p-4 md:p-6" id="conteudo-central">
        
        <div id="loading" class="flex flex-col items-center justify-center py-20 space-y-4">
            <div class="w-10 h-10 border-4 border-t-blue-500 border-gray-800 rounded-full animate-spin"></div>
            <p class="text-xs text-gray-400 uppercase tracking-widest font-mono">Conectando à Fábrica NoSQL...</p>
        </div>

        <div id="interface-dinamica" class="hidden space-y-6">
            
            <div class="p-6 md:p-8 rounded-2xl border border-gray-800/60 relative overflow-hidden flex flex-col items-center text-center space-y-3" id="custom-header">
                <div class="absolute inset-0 opacity-10 pointer-events-none" id="custom-bg-gradient"></div>
                <div class="w-20 h-20 bg-white rounded-full p-1 border-2 shadow-xl overflow-hidden flex items-center justify-center" id="custom-border-logo">
                    <img id="custom-logo" src="" alt="Logo Cliente" class="w-full h-full object-cover">
                </div>
                <div>
                    <h1 class="text-xl md:text-2xl font-black uppercase tracking-wide" id="custom-nome">Carregando...</h1>
                    <p class="text-xs text-gray-400 mt-1 font-mono uppercase" id="custom-subtitulo">Painel Operacional Ativo</p>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                
                <div class="bg-[#171A21] p-5 rounded-xl border border-gray-800/80 md:col-span-2">
                    <h2 class="text-sm font-bold uppercase tracking-wider mb-4 flex items-center gap-2 text-white">
                        <span>📝</span> <span id="titulo-formulario">Ficha de Registro Geral</span>
                    </h2>
                    <form id="form-dinamico-cliente" class="space-y-4 text-xs" onsubmit="event.preventDefault(); alert('Modo Demonstração: Dados validados com sucesso!');">
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4" id="campos-formulario">
                        </div>
                       <button type="button" onclick="window.processarAcao()" id="btn-submit-dinamico" class="w-full text-xs font-bold py-2.5 rounded-lg transition-all duration-300 uppercase tracking-wider shadow-lg">
                            Confirmar Ação e Salvar
                        </button>
                    </form>
                </div>

                <div class="space-y-4">
                    <div class="bg-[#171A21] p-5 rounded-xl border border-gray-800/80 space-y-2 text-xs">
                        <h3 class="font-bold text-white uppercase tracking-wider">💡 Informações Legais</h3>
                        <p class="text-gray-400 leading-relaxed text-justify" id="texto-apresentacao">
                            Carregando histórico e termos de uso do establishment...
                        </p>
                    </div>
                    
                    <div class="bg-[#171A21] p-4 rounded-xl border border-gray-800/40 text-center">
                        <button onclick="window.print()" class="text-[11px] text-gray-400 hover:text-white transition font-mono">🖨️ IMPRIMIR COMPROVANTE / PDF</button>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <footer class="bg-[#171A21] border-t border-gray-800/60 text-center py-4 text-[10px] text-gray-500 font-mono mt-6">
        <p>POWERED BY BORGES SISTEMAS INTELIGENTES — INFRAESTRUTURA ESCALÁVEL</p>
    </footer>

    <div onclick="document.getElementById('loginOverlay').style.display='flex'" class="fixed bottom-5 right-5 cursor-pointer opacity-50 hover:opacity-100">⚙️</div>

    <div id="loginOverlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:999; flex-direction:column; align-items:center; justify-content:center;">
        <h2 class="text-white mb-4">ACESSO ADMINISTRATIVO</h2>
        <input type="password" id="senhaInput" placeholder="Senha Mestra" class="bg-gray-800 text-white p-2 rounded mb-4 text-center">
        <button onclick="logarAdmin()" class="bg-blue-600 text-white px-6 py-2 rounded">ACESSAR</button>
        <button class="mt-4 text-gray-500" onclick="document.getElementById('loginOverlay').style.display='none'">Fechar</button>
    </div>

<script type="module">
       import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAMYE7ZLM4jtoVnshqowLSaSL-mYCW1lhI",
            authDomain: "sistemas-inteligentes-38cdc.firebaseapp.com",
            projectId: "sistemas-inteligentes-38cdc",
            storageBucket: "sistemas-inteligentes-38cdc.firebasestorage.app",
            messagingSenderId: "632476998816",
            appId: "1:632476998816:web:3cb6936a5e3517b09dbdc5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let configCliente = {};

        async function buscarTemplateDoBanco(nichoId) {
            try {
                const snap = await getDoc(doc(db, "templates", nichoId));
                if (snap.exists()) {
                    const data = snap.data();
                    configCliente = {
                        nome: data.nome,
                        logo: data.logo,
                        cor: data.cor,
                        tituloForm: data.titulo || "Ficha de Registro",
                        textoApresentacao: data.apresentacao,
                        htmlCampos: data.campos
                    };
                }
            } catch (e) { console.error("Erro ao buscar template:", e); }
        }

        async function inicializarCentralDinamica() {
            const params = new URLSearchParams(window.location.search);
            const cid = params.get('cid'); 
            
            if (!cid) {
                document.body.innerHTML = "<div class='text-center p-10 text-red-500'>Erro: Link inválido. Entre em contato com Borges Soluções.</div>";
                return;
            }
            
            const clienteSnap = await getDoc(doc(db, "clients", cid));
            
            if (!clienteSnap.exists()) {
                document.getElementById("loading").innerHTML = "<p class='text-red-500'>Cliente não encontrado.</p>";
                return;
            }

            const dadosCliente = clienteSnap.data();
            
            // Salva a senha correta globalmente para a função de login usar
            window.senhaMestraCorreta = dadosCliente.senhaMestra;
            window.statusCliente = dadosCliente.status;
            
           // 2. Sistema de Bloqueio (Trava de Segurança)
            if (dadosCliente.status === "Bloqueado") {
                document.body.innerHTML = "<div class='flex h-screen items-center justify-center text-red-500 font-bold'>ACESSO SUSPENSO: Entre em contato com Borges Soluções.</div>";
                return;
            }
            
            // Se for Demonstração, mantemos o aviso de desenvolvimento, mas não travamos o acesso total
            if (dadosCliente.status === "Demonstração") {
                console.log("Modo Degustação Ativo");
            }

            await buscarTemplateDoBanco(dadosCliente.nicho);

            document.title = `${configCliente.nome} — Central de Atendimento`;
            document.getElementById("custom-nome").innerText = configCliente.nome;
            document.getElementById("custom-logo").src = configCliente.logo;
            document.getElementById("custom-border-logo").style.borderColor = configCliente.cor;
            
            const btnSubmit = document.getElementById("btn-submit-dinamico");
            btnSubmit.style.backgroundColor = configCliente.cor;

            document.getElementById("titulo-formulario").innerText = configCliente.tituloForm;
            document.getElementById("texto-apresentacao").innerHTML = configCliente.textoApresentacao;
            document.getElementById("campos-formulario").innerHTML = configCliente.htmlCampos;

            document.getElementById("loading").classList.add("hidden");
            document.getElementById("interface-dinamica").classList.remove("hidden");
        }

        window.addEventListener('DOMContentLoaded', inicializarCentralDinamica);

    window.logarAdmin = function() {
            const senhaDigitada = document.getElementById('senhaInput').value;
            // Valida com a senhaMestra vinda do banco (configCliente ou dadosCliente)
            // Como configCliente busca o Template, usaremos a senha que está em dadosCliente
            // Para isso, precisamos tornar dadosCliente global ou buscá-la aqui
            if(senhaDigitada === window.senhaMestraCorreta) {
                document.getElementById('loginOverlay').style.display = 'none';
                alert("Acesso liberado ao Painel Administrativo!");
                // Aqui você abriria sua área administrativa
            } else {
                alert("Senha incorreta.");
            }
        };
    window.processarAcao = () => {
            // Verifica o status do cliente (carregado globalmente)
            const statusAtual = window.statusCliente; 
            
            if (statusAtual === "Demonstração") {
                alert("⚠️ Função exclusiva para assinantes! Entre em contato com a Borges Soluções para liberar o acesso total.");
                return;
            }
            
            // Se não for demonstração, submete o formulário
            document.getElementById("form-dinamico-cliente").submit();
        };
    </script>
</body>
</html>
