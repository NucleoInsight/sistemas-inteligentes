<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carregando Central Inteligente...</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #0F1115; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #171A21; border-radius: 3px; }
    </style>
</head>
<body class="min-h-screen bg-[#0F1115] text-white font-sans custom-scrollbar flex flex-col justify-between">

    <main class="flex-1 w-full max-w-4xl mx-auto p-4 md:p-6" id="conteudo-central">
        
        <div id="loading" class="flex flex-col items-center justify-center py-20 space-y-4">
            <div class="w-10 h-10 border-4 border-t-blue-500 border-gray-800 rounded-full animate-spin"></div>
            <p class="text-xs text-gray-400 uppercase tracking-widest font-mono">Conectando à Fábrica NoSQL...</p>
        </div>

        <div id="interface-dinamica" class="hidden space-y-6">
            
            <div class="p-6 md:p-8 rounded-2xl border border-gray-800/60 relative overflow-hidden flex flex-col items-center text-center space-y-3" id="custom-header">
                <div class="absolute inset-0 opacity-10 pointer-events-none" id="custom-bg-gradient"></div>
                <div class="w-20 h-20 bg-white rounded-full p-1 border-2 shadow-xl overflow-hidden flex items-center justify-center" id="custom-border-logo">
                    <img id="custom-logo" src="" alt="Logo Cliente" class="w-full h-full object-cover">
                </div>
                <div>
                    <h1 class="text-xl md:text-2xl font-black uppercase tracking-wide" id="custom-nome">Carregando...</h1>
                    <p class="text-xs text-gray-400 mt-1 font-mono uppercase" id="custom-subtitulo">Painel Operacional Ativo</p>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                
                <div class="bg-[#171A21] p-5 rounded-xl border border-gray-800/80 md:col-span-2">
                    <h2 class="text-sm font-bold uppercase tracking-wider mb-4 flex items-center gap-2 text-white">
                        <span>📝</span> <span id="titulo-formulario">Ficha de Registro Geral</span>
                    </h2>
                    <form id="form-dinamico-cliente" class="space-y-4 text-xs" onsubmit="event.preventDefault(); alert('Modo Demonstração: Dados validados com sucesso!');">
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4" id="campos-formulario">
                        </div>
                        <button type="submit" id="btn-submit-dinamico" class="w-full text-xs font-bold py-2.5 rounded-lg transition-all duration-300 uppercase tracking-wider shadow-lg">
                            Confirmar Ação e Salvar
                        </button>
                    </form>
                </div>

                <div class="space-y-4">
                    <div class="bg-[#171A21] p-5 rounded-xl border border-gray-800/80 space-y-2 text-xs">
                        <h3 class="font-bold text-white uppercase tracking-wider">💡 Informações Legais</h3>
                        <p class="text-gray-400 leading-relaxed text-justify" id="texto-apresentacao">
                            Carregando histórico e termos de uso do establishment...
                        </p>
                    </div>
                    
                    <div class="bg-[#171A21] p-4 rounded-xl border border-gray-800/40 text-center">
                        <button onclick="window.print()" class="text-[11px] text-gray-400 hover:text-white transition font-mono">🖨️ IMPRIMIR COMPROVANTE / PDF</button>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <footer class="bg-[#171A21] border-t border-gray-800/60 text-center py-4 text-[10px] text-gray-500 font-mono mt-6">
        <p>POWERED BY BORGES SISTEMAS INTELIGENTES — INFRAESTRUTURA ESCALÁVEL</p>
    </footer>

<script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAMYE7ZLM4jtoVnshqowLSaSL-mYCW1lhI",
            authDomain: "sistemas-inteligentes-38cdc.firebaseapp.com",
            projectId: "sistemas-inteligentes-38cdc",
            storageBucket: "sistemas-inteligentes-38cdc.firebasestorage.app",
            messagingSenderId: "632476998816",
            appId: "1:632476998816:web:3cb6936a5e3517b09dbdc5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const urlParams = new URLSearchParams(window.location.search);
        const clientId = urlParams.get('id');

        // 🏆 DICIONÁRIO DE ARQUITETURA DE NICHOS (Garante a padronização do sistema)
        const perfisNichos = {
            "capoeira": {
                titulo: "Ficha de Matrícula e Graduação",
                apresentacao: "Área operacional ativa. Este painel serve para captação de novos alunos, registro de dados de saúde e controle de graduações oficiais de cordões sob supervisão técnica.",
                cor: "#FFD700", // Amarelo Ouro Original
                logo: "https://grupocordaodeouro.com.br/wp-content/uploads/2021/08/logo-cdo.png",
                campos: `
                    <div class="flex flex-col gap-1"><label class="text-gray-400">Nome Completo</label><input type="text" required class="bg-[#0F1115] border border-gray-800 rounded px-3 py-2 text-white focus:outline-none focus:border-[#FFD700]"></div>
                    <div class="flex flex-col gap-1"><label class="text-gray-400">Apelido na Capoeira</label><input type="text" class="bg-[#0F1115] border border-gray-800 rounded px-3 py-2 text-white focus:outline-none focus:border-[#FFD700]"></div>
                    <div class="flex flex-col gap-1"><label class="text-gray-400">WhatsApp / Contato</label><input type="tel" required class="bg-[#0F1115] border border-gray-800 rounded px-3 py-2 text-white focus:outline-none focus:border-[#FFD700]"></div>
                    <div class="flex flex-col gap-1">
                        <label class="text-gray-400">Graduação / Cordão</label>
                        <select class="bg-[#0F1115] border border-gray-800 rounded px-2 py-2 text-white focus:outline-none focus:border-[#FFD700]">
                            <option>Iniciante</option><option>Crua</option><option>Amarela</option><option>Laranja</option><option>Azul</option><option>Verde</option><option>Professor</option>
                        </select>
                    </div>
                    <div class="flex flex-col gap-1 sm:col-span-2"><label class="text-gray-400">Histórico Médico / Restrições de Saúde</label><textarea rows="2" class="bg-[#0F1115] border border-gray-800 rounded px-3 py-2 text-white focus:outline-none focus:border-[#FFD700]"></textarea></div>
                `
            },
            "prestador_servico": {
                titulo: "Ordem de Serviço & Chamado Técnico",
                apresentacao: "Área de registro operacional. Registre novos chamados, visitas técnicas, manutenções ou orçamentos de serviços diretamente na nossa central unificada.",
                cor: "#10B981", // Verde Esmeralda (Transmite confiança técnica)
                logo: "https://cdn-icons-png.flaticon.com/512/2942/2942503.png",
                campos: `
                    <div class="flex flex-col gap-1"><label class="text-gray-400">Nome do Client</label><input type="text" required class="bg-[#0F1115] border border-gray-800 rounded px-3 py-2 text-white focus:outline-none focus:border-emerald-500"></div>
                    <div class="flex flex-col gap-1"><label class="text-gray-400">WhatsApp / Telefone</label><input type="tel" required class="bg-[#0F1115] border border-gray-800 rounded px-3 py-2 text-white focus:outline-none focus:border-emerald-500"></div>
                    <div class="flex flex-col gap-1 sm:col-span-2"><label class="text-gray-400">Endereço do Atendimento</label><input type="text" required class="bg-[#0F1115] border border-gray-800 rounded px-3 py-2 text-white focus:outline-none focus:border-emerald-500"></div>
                    <div class="flex flex-col gap-1 sm:col-span-2"><label class="text-gray-400">Descrição Detalhada do Defeito / Serviço</label><textarea rows="2" required class="bg-[#0F1115] border border-gray-800 rounded px-3 py-2 text-white focus:outline-none focus:border-emerald-500"></textarea></div>
                `
            },
            "estetica_barbearia": {
                titulo: "Agendamento de Horário Premium",
                apresentacao: "Central de Reservas Ativa. Selecione o serviço desejado e preencha seus dados de contato para travar sua cadeira ou maca na grade operacional do dia.",
                cor: "#EF4444", // Vermelho Clínico/Barber
                logo: "https://cdn-icons-png.flaticon.com/512/1995/1995470.png",
                campos: `
                    <div class="flex flex-col gap-1"><label class="text-gray-400">Nome Completo</label><input type="text" required class="bg-[#0F1115] border border-gray-800 rounded px-3 py-2 text-white focus:outline-none focus:border-red-500"></div>
                    <div class="flex flex-col gap-1"><label class="text-gray-400">WhatsApp de Contato</label><input type="tel" required class="bg-[#0F1115] border border-gray-800 rounded px-3 py-2 text-white focus:outline-none focus:border-red-500"></div>
                    <div class="flex flex-col gap-1">
                        <label class="text-gray-400">Procedimento / Serviço</label>
                        <select class="bg-[#0F1115] border border-gray-800 rounded px-2 py-2 text-white focus:outline-none focus:border-red-500">
                            <option>Atendimento Padrão / Avaliação</option>
                            <option>Procedimento Premium Combinado</option>
                        </select>
                    </div>
                    <div class="flex flex-col gap-1"><label class="text-gray-400">Data e Hora Solicitada</label><input type="datetime-local" required class="bg-[#0F1115] border border-gray-800 rounded px-3 py-2 text-white focus:outline-none focus:border-red-500"></div>
                `
            },
            "fitness_personal": {
                titulo: "Check-in de Alunos & Ficha Ativa",
                apresentacao: "Painel Core de controle de acesso e treino. Realize a validação da sua presença para liberar a grade diária de treinos ou agendamento com o Personal responsável.",
                cor: "#06B6D4", // Neon Ciano (Energia/Academia)
                logo: "https://cdn-icons-png.flaticon.com/512/3135/3135715.png",
                campos: `
                    <div class="flex flex-col gap-1"><label class="text-gray-400">Nome do Aluno / Paciente</label><input type="text" required class="bg-[#0F1115] border border-gray-800 rounded px-3 py-2 text-white focus:outline-none focus:border-cyan-500"></div>
                    <div class="flex flex-col gap-1"><label class="text-gray-400">Matrícula ou CPF</label><input type="text" required class="bg-[#0F1115] border border-gray-800 rounded px-3 py-2 text-white focus:outline-none focus:border-cyan-500"></div>
                    <div class="flex flex-col gap-1 sm:col-span-2"><label class="text-gray-400">Restrições ou Observações para o Treino do Dia</label><input type="text" class="bg-[#0F1115] border border-gray-800 rounded px-3 py-2 text-white focus:outline-none focus:border-cyan-500" placeholder="Nenhuma"></div>
                `
            }
        };

        // Configuração padrão de Demonstração Geral (Fallback)
        let configCliente = {
            nome: "Borges Sistemas Demonstrativos",
            logo: "https://cdn-icons-png.flaticon.com/512/561/561170.png",
            cor: "#3B82F6",
            tituloForm: "Ficha de Atendimento Geral",
            textoApresentacao: "Central de coleta operacional ativa. Este painel adapta-se dinamicamente às necessidades do seu modelo de negócios através da nossa esteira NoSQL de 72 horas.",
            htmlCampos: `
                <div class="flex flex-col gap-1"><label class="text-gray-400">Nome Completo</label><input type="text" required class="bg-[#0F1115] border border-gray-800 rounded px-3 py-2 text-white focus:outline-none focus:border-blue-500"></div>
                <div class="flex flex-col gap-1"><label class="text-gray-400">WhatsApp</label><input type="tel" required class="bg-[#0F1115] border border-gray-800 rounded px-3 py-2 text-white focus:outline-none focus:border-blue-500"></div>
            `
        };

        async function inicializarCentralDinamica() {
            // 🔍 BUSCA CONFIGURAÇÃO OPERACIONAL NO FIRESTORE
            if (clientId && clientId !== "undefined") {
                try {
                    const docRef = doc(db, "clients", clientId);
                    const docSnap = await getDoc(docRef);
                    
                    if (docSnap.exists()) {
                        const dadosBanco = docSnap.data();
                        
                        // Garante leitura inteligente independente de strings antigas ou maiúsculas
                        let nichoChave = "prestador_servico"; 
                        if (dadosBanco.templateNicho) {
                            const stringBanco = dadosBanco.templateNicho.toLowerCase();
                            if (stringBanco.includes("capoeira")) nichoChave = "capoeira";
                            else if (stringBanco.includes("barber") || stringBanco.includes("estetica")) nichoChave = "estetica_barbearia";
                            else if (stringBanco.includes("academia") || stringBanco.includes("fitness")) nichoChave = "fitness_personal";
                        }

                        const perfilDefinido = perfisNichos[nichoChave];
                        
                        configCliente.nome = dadosBanco.nome || configCliente.nome;
                        configCliente.cor = dadosBanco.cor || perfilDefinido.cor;
                        configCliente.logo = dadosBanco.logo || perfilDefinido.logo;
                        configCliente.tituloForm = dadosBanco.tituloForm || perfilDefinido.titulo;
                        configCliente.textoApresentacao = dadosBanco.textoApresentacao || perfilDefinido.apresentacao;
                        configCliente.htmlCampos = perfilDefinido.campos;
                    }
                } catch (e) {
                    console.error("Erro ao puxar customização do Firestore: ", e);
                }
            } 
            // ⚡ SE FOR UMA URL DE GATILHO RÁPIDO PARA VENDAS (Ex: ?nicho=capoeira ou ?nicho=prestador)
            else {
                const nichoUrl = urlParams.get('nicho');
                if (perfisNichos[nichoUrl]) {
                    const perfil = perfisNichos[nichoUrl];
                    configCliente.nome = nichoUrl === "capoeira" ? "Grupo Cordão de Ouro" : "Sua Empresa Aqui — Demonstração";
                    configCliente.cor = perfil.cor;
                    configCliente.logo = perfil.logo;
                    configCliente.tituloForm = perfil.titulo;
                    configCliente.textoApresentacao = perfil.apresentacao;
                    configCliente.htmlCampos = perfil.campos;
                }
            }

            // 🎨 INJEÇÃO DE VARIÁVEIS NO DOM (Renderização limpa e padronizada)
            document.title = `${configCliente.nome} — Central de Atendimento`;
            document.getElementById("custom-nome").innerText = configCliente.nome;
            document.getElementById("custom-logo").src = configCliente.logo;
            document.getElementById("custom-border-logo").style.borderColor = configCliente.cor;
            
            const btnSubmit = document.getElementById("btn-submit-dinamico");
            btnSubmit.style.backgroundColor = configCliente.cor;
            btnSubmit.style.color = configCliente.cor === "#FFD700" ? "#000000" : "#FFFFFF";

            document.getElementById("titulo-formulario").innerText = configCliente.tituloForm;
            document.getElementById("texto-apresentacao").innerHTML = configCliente.textoApresentacao;
            document.getElementById("campos-formulario").innerHTML = configCliente.htmlCampos;

            // Transição visual: oculta o loading e exibe a interface pronta
            document.getElementById("loading").classList.add("hidden");
            document.getElementById("interface-dinamica").classList.remove("hidden");
        }

        window.addEventListener('DOMContentLoaded', inicializarCentralDinamica);
    </script>
</body>
</html>
