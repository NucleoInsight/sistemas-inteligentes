<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carregando Central Inteligente...</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #0F1115; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #171A21; border-radius: 3px; }
    </style>
</head>
<body class="min-h-screen bg-[#0F1115] text-white font-sans custom-scrollbar flex flex-col justify-between">

    <main class="flex-1 w-full max-w-4xl mx-auto p-4 md:p-6" id="conteudo-central">
        
        <div id="loading" class="flex flex-col items-center justify-center py-20 space-y-4">
            <div class="w-10 h-10 border-4 border-t-blue-500 border-gray-800 rounded-full animate-spin"></div>
            <p class="text-xs text-gray-400 uppercase tracking-widest font-mono">Conectando à Fábrica NoSQL...</p>
        </div>

        <div id="interface-dinamica" class="hidden space-y-6">
            
            <div class="p-6 md:p-8 rounded-2xl border border-gray-800/60 relative overflow-hidden flex flex-col items-center text-center space-y-3" id="custom-header">
                <div class="absolute inset-0 opacity-10 pointer-events-none" id="custom-bg-gradient"></div>
                <div class="w-20 h-20 bg-white rounded-full p-1 border-2 shadow-xl overflow-hidden flex items-center justify-center" id="custom-border-logo">
                    <img id="custom-logo" src="" alt="Logo Cliente" class="w-full h-full object-cover">
                </div>
                <div>
                    <h1 class="text-xl md:text-2xl font-black uppercase tracking-wide" id="custom-nome">Carregando...</h1>
                    <p class="text-xs text-gray-400 mt-1 font-mono uppercase" id="custom-subtitulo">Painel Operacional Ativo</p>
                </div>
            </div>

           <div id="palco-principal" class="w-full">
    </div>

<div id="interface-aluno" class="hidden space-y-6 w-full">
    <div class="text-center p-6 border-b border-gray-800">
        <h2 class="text-white font-black text-xl uppercase tracking-widest" id="aluno-nome-display">Área do Aluno</h2>
        <p class="text-gray-500 text-[10px] uppercase tracking-widest mt-1">Sua evolução começa aqui</p>
    </div>
    <div id="conteudo-aluno-dinamico" class="bg-[#171A21] p-5 rounded-xl border border-gray-800">
        <div id="container-video-aluno"></div>
    </div>
</div>
        </div>
    </main>

    <footer class="bg-[#171A21] border-t border-gray-800/60 text-center py-4 text-[10px] text-gray-500 font-mono mt-6">
        <p>POWERED BY BORGES SISTEMAS INTELIGENTES — INFRAESTRUTURA ESCALÁVEL</p>
    </footer>

    <div onclick="document.getElementById('loginOverlay').style.display='flex'" class="fixed bottom-5 right-5 cursor-pointer opacity-50 hover:opacity-100">⚙️</div>

    <div id="loginOverlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:999; flex-direction:column; align-items:center; justify-content:center;">
        <h2 class="text-white mb-4">ACESSO ADMINISTRATIVO</h2>
        <input type="password" id="senhaInput" placeholder="Senha Mestra" class="bg-gray-800 text-white p-2 rounded mb-4 text-center">
        <button onclick="logarAdmin()" class="bg-blue-600 text-white px-6 py-2 rounded">ACESSAR</button>
        <button class="mt-4 text-gray-500" onclick="document.getElementById('loginOverlay').style.display='none'">Fechar</button>
    </div>

<script type="module">
       import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
       import { getFirestore, doc, getDoc, addDoc, collection, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

     window.logarAdmin = async () => {
            const senha = document.getElementById("senhaInput").value.trim();
            const senhaMestraNoBanco = String(window.senhaMestraCorreta || "").trim();
            const senhaPadraoAdmin = "Borges@123456";
            const senhaPadraoAluno = "Cliente@123456"; // Senha do Aluno

            if (senha === senhaMestraNoBanco || senha === senhaPadraoAdmin) {
                // LOGIN DO MESTRE/ADMIN
                document.getElementById('loginOverlay').style.display = 'none';

                // Chama o novo motor para injetar o painel de gestão no palco
                window.renderizarPagina('gestao');

                alert("✅ Acesso Liberado ao Painel do Mestre!");
            }
            else if (senha === senhaPadraoAluno) {
                // LOGIN DO ALUNO
                document.getElementById('loginOverlay').style.display = 'none';
                
                // Chama o motor para renderizar a interface do Aluno no palco principal
             // Chama o motor para renderizar a interface do Aluno no palco principal
                window.renderizarPagina('aluno', { alunoNome: 'Aluno' });
                
                alert("✅ Bem-vindo à sua Área!");
            } 
            else {
                alert("❌ Senha incorreta.");
            }
        }; // <--- ESTA CHAVE FECHA A FUNÇÃO DE LOGIN INTEIRA
        const firebaseConfig = {
            apiKey: "AIzaSyAMYE7ZLM4jtoVnshqowLSaSL-mYCW1lhI",
            authDomain: "sistemas-inteligentes-38cdc.firebaseapp.com",
            projectId: "sistemas-inteligentes-38cdc",
            storageBucket: "sistemas-inteligentes-38cdc.firebasestorage.app",
            messagingSenderId: "632476998816",
            appId: "1:632476998816:web:3cb6936a5e3517b09dbdc5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        // Expondo funções do Firebase para o escopo global do navegador
        window.db = db;
        window.doc = doc;
        window.getDoc = getDoc;
        let configCliente = {};

        async function buscarConfiguracaoDoCliente(dadosCliente) {
            try {
                // Se o cliente tem a configuração salva (snapshot), usamos ela. 
                // Se não tiver (cliente antigo), buscamos no template original (fallback).
                const data = dadosCliente.configuracaoPersonalizada || {};
                
                configCliente = {
                    nome: dadosCliente.nome || data.nome,
                    logo: data.logo || "",
                    cor: dadosCliente.cor || data.cor || "#3B82F6",
                    tituloForm: data.titulo || "Ficha de Registro",
                    textoApresentacao: data.apresentacao || "",
                    htmlCampos: data.campos || ""
                };
            } catch (e) { console.error("Erro ao configurar cliente:", e); }
        }

    // ESTA É A FUNÇÃO QUE O SEU MOTOR ESTÁ PROCURANDO
window.renderizarGestaoAlunos = async () => {
    const { collection, getDocs } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js");
    const params = new URLSearchParams(window.location.search);
    const cid = params.get('cid');
    if (!cid) return;
    
    const snapshot = await getDocs(collection(db, "clients", cid, "dados"));
    const listaArea = document.getElementById('area-lista-alunos');
    
    if (!listaArea) return; // Se não achou o palco, não tenta desenhar
    
    let alunos = [];
    snapshot.forEach(doc => alunos.push({ id: doc.id, ...doc.data() }));

    listaArea.innerHTML = `
        <div class="mt-6 bg-[#171A21] p-4 rounded-xl border border-gray-700">
            <h3 class="text-white font-bold mb-4 uppercase text-xs">Lista de Alunos (${alunos.length})</h3>
            <input type="text" id="buscaAluno" placeholder="🔍 Pesquisar nome..." 
                class="w-full bg-gray-900 border border-gray-800 rounded p-2 text-white text-xs mb-3"
                onkeyup="window.filtrarAlunos()">
            <div id="lista-alunos-scroll" class="space-y-2">
                ${alunos.map(d => `
                    <div class="aluno-item flex justify-between items-center bg-gray-900 p-3 rounded border ${d.statusPagamento === 'Debito' ? 'border-red-500' : 'border-gray-800'} text-xs">
                        <span class="nome-aluno text-white">${d.alunoNome || 'Sem Nome'}</span>
                        <button onclick="window.renderizarPagina('aluno', { alunoNome: '${d.alunoNome}' })" class="text-blue-400">Ver Aluno</button>
                    </div>
                `).join('')}
            </div>
        </div>`;
};

        window.registrarAcao = async (exercicio) => {
            try {
                const params = new URLSearchParams(window.location.search);
                const cid = params.get('cid');
                
                await addDoc(collection(db, "notificacoes"), {
                    cid: cid,
                    exercicio: exercicio,
                    data: new Date().toISOString(),
                    status: "Concluido"
                });
                
                alert("✅ Exercício registrado com sucesso!");
            } catch (e) {
                console.error("Erro ao registrar:", e);
                alert("Erro ao salvar notificação.");
            }
        };

    window.salvarTreino = async (id, feedback) => {
        try {
            // Usa o ID que você recebe pela URL (?cid=...)
            const docRef = doc(db, "clients", id);
            await updateDoc(docRef, {
                "treinoDiario": {
                    feedback: feedback,
                    data: new Date().toISOString(),
                    status: "Concluído"
                }
            });
            alert("✅ Treino registrado com sucesso!");
        } catch (e) {
            console.error("Erro ao salvar:", e);
        }
    };

   // --- DISPARO SEGURO DO MOTOR ---
    window.onload = async () => {
        // Inicializa o motor de renderização automaticamente ao carregar a página
        await window.renderizarPagina('gestao');
    };
    // MOTOR INTELIGENTE CENTRALIZADO
    // MOTOR INTELIGENTE CENTRALIZADO (VERSÃO BLINDADA)
    window.acaoInteligente = async (tipo, subcolecao = 'ficha') => {
        const params = new URLSearchParams(window.location.search);
        const cid = params.get('cid');
        if (!cid) return alert("Erro: ID do cliente não encontrado.");
        
        // Pega dados de qualquer container (deixa de ser fixo no container-dinamico)
        const container = document.querySelector('#container-dinamico') || document.body;
        const inputs = container.querySelectorAll('input, select, textarea');
        let dados = {};
        inputs.forEach(i => { if (i.id) dados[i.id] = i.type === 'checkbox' ? i.checked : i.value; });

        if (tipo === 'salvar') {
            try {
                // Se existir CPF no formulário, usamos ele como ID da ficha, se não, usamos 'ficha-geral'
                const cpf = dados.alunoCpf ? dados.alunoCpf.replace(/\D/g, '') : null;
                const idFicha = cpf ? `ficha-${cpf}` : `ficha-${Date.now()}`;
                
                await setDoc(doc(db, "clients", cid, "dados", idFicha), dados, { merge: true });
                alert(`✅ Ficha salva com sucesso! ID: ${idFicha}`);
            } catch (e) {
                console.error("Erro ao salvar:", e);
                alert("Erro ao salvar os dados.");
            }
        } 
        
        else if (tipo === 'whatsapp') {
            const nome = dados.alunoNome || "Cliente";
            const msg = `Olá! Me chamo ${nome} e gostaria de falar sobre meu cadastro.`;
            window.open(`https://wa.me/557599864-9927?text=${encodeURIComponent(msg)}`, '_blank');
        }
        
        else if (tipo === 'agendar') {
            alert("Abrindo agenda personalizada...");
        }
    };

    // MOTOR DE CARREGAMENTO UNIVERSAL
    window.carregarDados = async (subcolecao = 'ficha') => {
        const params = new URLSearchParams(window.location.search);
        const cid = params.get('cid');
        if (!cid) return;

        try {
            const docRef = doc(db, "clients", cid, "dados", subcolecao);
            const docSnap = await getDoc(docRef);

            if (docSnap.exists()) {
                const dados = docSnap.data();
                // Preenche os campos automaticamente baseando-se nos IDs
                Object.keys(dados).forEach(id => {
                    const el = document.getElementById(id);
                    if (el) {
                        if (el.type === 'checkbox') el.checked = dados[id];
                        else el.value = dados[id];
                    }
                });
                console.log(`✅ Dados carregados de: ${subcolecao}`);
            }
        } catch (e) {
            console.error("Erro ao carregar dados:", e);
        }
    };

    // --- MOTOR DE KPIs CORRIGIDO ---
    window.atualizarDashboard = async () => {
        try {
            const { collection, getDocs } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js");
            const params = new URLSearchParams(window.location.search);
            const cid = params.get('cid');
            if (!cid) return;

            const snapshot = await getDocs(collection(db, "clients", cid, "dados"));
            
            let total = 0;
            let debito = 0;

            snapshot.forEach(doc => {
                total++;
                if (doc.data().statusPagamento === 'Debito') {
                    debito++;
                }
            });

            const elAlunos = document.getElementById('kpi-total-alunos');
            const elInad = document.getElementById('kpi-inadimplentes');
            
            if (elAlunos) elAlunos.innerText = total;
            if (elInad) elInad.innerText = debito;
            
            console.log(`✅ KPIs atualizados: Total=${total}, Débitos=${debito}`);
        } catch (e) {
            console.error("Erro ao atualizar KPIs:", e);
        }
    };

   window.renderizarPagina = async (tipo, dados = null) => {
    const palco = document.getElementById('palco-principal');
    const loading = document.getElementById('loading');
    
    // 1. Limpeza total do palco
    palco.innerHTML = '<div class="text-white p-10 text-center">Carregando interface...</div>';

    // 2. Lógica de renderização
    if (tipo === 'gestao') {
        palco.innerHTML = `
            <div id="container-painel-gestor" class="w-full">
                <div id="area-lista-alunos"></div>
            </div>`;
        
        await window.atualizarDashboard();
        await window.renderizarGestaoAlunos();
    } 
    else if (tipo === 'aluno') {
        palco.innerHTML = `
            <div id="interface-aluno" class="p-6 bg-[#171A21] rounded-xl text-white">
                <h1 id="aluno-nome-display" class="text-2xl font-bold mb-4"></h1>
                <div id="container-video-aluno"></div>
            </div>`;
        
        if (dados) {
            document.getElementById('aluno-nome-display').innerText = dados.alunoNome || "Olá, Cliente!";
            if (dados.linkVideoTreino) {
                window.exibirVideoParaAluno(dados.linkVideoTreino);
            }
        }
    }

    // 3. Esconde o loading que está travando sua tela
    if (loading) loading.classList.add('hidden');
};

    window.filtrarAlunos = () => {
        const termo = document.getElementById('buscaAluno').value.toLowerCase();
        const itens = document.querySelectorAll('.aluno-item');
        itens.forEach(item => {
            const nome = item.querySelector('.nome-aluno').innerText.toLowerCase();
            item.style.display = nome.includes(termo) ? 'flex' : 'none';
        });
    };

    window.registrarPagamento = async (idFicha, status) => {
        const params = new URLSearchParams(window.location.search);
        const cid = params.get('cid');
        await updateDoc(doc(db, "clients", cid, "dados", idFicha), { statusPagamento: status });
        alert("✅ Status atualizado!");
        window.atualizarDashboard();
        window.renderizarGestaoAlunos();
    };

    window.copiarGatilhoAluno = (nomeAluno, linkFormulario) => {
        const texto = `Olá, ${nomeAluno || 'aluno(a)'}! Acesse aqui: ${linkFormulario}`;
        navigator.clipboard.writeText(texto).then(() => alert("✅ Copiado!"));
    };

    window.exibirVideo = function(url) {
        if (!url) return;
        const videoId = url.includes('v=') ? url.split('v=')[1].split('&')[0] : url.split('/').pop();
        const container = document.getElementById('container-video');
        if (container) {
            container.innerHTML = `<iframe class="w-full h-48 rounded-lg mt-4" src="https://www.youtube.com/embed/${videoId}" frameborder="0" allowfullscreen></iframe>`;
        }
    };
    window.gerarLinkAcesso = (idFicha, nomeCliente) => {
    const baseUrl = window.location.origin + window.location.pathname;
    const cid = new URLSearchParams(window.location.search).get('cid');
    
    // Link 1: Cadastro (Formulário genérico para novos)
    const linkCadastro = `${baseUrl}?cid=${cid}&modo=preencher`;
    
    // Link 2: Área do Cliente (Direcionado para o ID específico)
    const linkAreaCliente = `${baseUrl}?cid=${cid}&modo=acesso&fid=${idFicha}`;

    const msg = `*🚀 ACESSE SEU PORTAL INTELIGENTE*\n\n` +
                `Olá, ${nomeCliente}! Liberei seu acesso ao sistema.\n\n` +
                `1️⃣ *PARA PREENCHER SEUS DADOS:*\n${linkCadastro}\n\n` +
                `2️⃣ *PARA ACESSAR SUA ÁREA DE CONTEÚDO:*\n${linkAreaCliente}\n` +
                `🔑 *SUA SENHA:* Cliente@123456\n\n` +
                `Qualquer dúvida, estou à disposição!`;
    
    navigator.clipboard.writeText(msg).then(() => {
        alert(`✅ Link de acesso do(a) ${nomeCliente} copiado com sucesso!`);
    });
};

   window.renderizarAreaAluno = async (cid, idFicha) => {
    console.log("🛠️ Tentando renderizar área do aluno para:", idFicha);
    const interfaceDinamica = document.getElementById('interface-dinamica');
    const interfaceAluno = document.getElementById('interface-aluno');
    if (interfaceDinamica) interfaceDinamica.style.display = 'none';
    if (interfaceAluno) {
        interfaceAluno.style.display = 'block'; 
        interfaceAluno.classList.remove('hidden'); 
    } else {
        console.error("❌ ERRO: DIV 'interface-aluno' não encontrada!");
    }
    const docRef = window.doc(window.db, "clients", cid, "dados", idFicha);
    const docSnap = await window.getDoc(docRef);
    if (docSnap.exists()) {
        const dados = docSnap.data();
        try { document.getElementById('aluno-nome-display').innerText = dados.alunoNome || "Olá, Cliente!"; } catch(e) { console.error(e); }
        if (dados.linkVideoTreino) {
            window.exibirVideoParaAluno(dados.linkVideoTreino);
        }
    }
};

window.exibirVideoParaAluno = (url) => {
    const videoId = url.includes('v=') ? url.split('v=')[1].split('&')[0] : url.split('/').pop();
    document.getElementById('container-video-aluno').innerHTML = `
        <h3 class="text-white font-bold text-xs uppercase mb-3">Vídeo do Treino</h3>
        <iframe class="w-full h-56 rounded-lg" src="https://www.youtube.com/embed/${videoId}" frameborder="0" allowfullscreen></iframe>
    `;
};

// EXPORTAÇÕES (OBRIGATÓRIAS PARA O ONCLICK E O MOTOR FUNCIONAREM)
window.logarAdmin = logarAdmin;
window.renderizarAreaAluno = renderizarAreaAluno;
window.exibirVideoParaAluno = exibirVideoParaAluno;
window.filtrarAlunos = filtrarAlunos;
window.registrarPagamento = registrarPagamento;
window.gerarLinkAcesso = gerarLinkAcesso;
window.exibirVideo = exibirVideo;
window.atualizarDashboard = atualizarDashboard;       // ADICIONE ESTA LINHA
window.renderizarGestaoAlunos = renderizarGestaoAlunos; // ADICIONE ESTA LINHA
window.renderizarPagina = renderizarPagina;             // ADICIONE ESTA LINHA

</script>
</body>
</html>
